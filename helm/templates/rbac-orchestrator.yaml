---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: e2b-orchestrator
  namespace: e2b

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: e2b-orchestrator-node-reader
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: e2b-orchestrator-node-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: e2b-orchestrator-node-reader
subjects:
- kind: ServiceAccount
  name: e2b-orchestrator
  namespace: e2b

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: e2b-orchestrator-pod-reader
  namespace: e2b
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: e2b-orchestrator-pod-reader-binding
  namespace: e2b
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: e2b-orchestrator-pod-reader
subjects:
- kind: ServiceAccount
  name: e2b-orchestrator
  namespace: e2b