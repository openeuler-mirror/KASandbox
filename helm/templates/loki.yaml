apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: e2b
data:
  loki-config.yml: |
    auth_enabled: false

    server:
      http_listen_port: {{ .Values.lokiServicePort | int }}
      log_level: "warn"
      grpc_server_max_recv_msg_size: 104857600  # 100 Mb
      grpc_server_max_send_msg_size: 104857600  # 100 Mb

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-shipper-active
        cache_location: /loki/tsdb-shipper-cache
        cache_ttl: 1h
      filesystem:
        directory: /loki/chunks

    chunk_store_config:
      chunk_cache_config:
        embedded_cache:
          enabled: true
          max_size_mb: 2048
          ttl: 30m

    query_range:
      align_queries_with_step: true
      cache_results: true
      max_retries: 2
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 2048
            ttl: 30m

    ingester_client:
      grpc_client_config:
        max_recv_msg_size: 104857600  # 100 Mb
        max_send_msg_size: 104857600  # 100 Mb

    ingester:
      chunk_idle_period: 10m
      chunk_encoding: snappy
      max_chunk_age: 15m
      chunk_target_size: 1048576  # 1MB
      wal:
        dir: /loki/wal
        enabled: false
        flush_on_shutdown: true

    schema_config:
      configs:
        - from: 2024-03-05
          store: tsdb
          object_store: filesystem
          schema: v12
          index:
            prefix: loki_index_
            period: 24h

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150

    # The bucket lifecycle policy should be set to delete objects after MORE than the specified retention period
    limits_config:
      retention_period: 168h
      ingestion_rate_mb: 100
      ingestion_burst_size_mb: 500
      per_stream_rate_limit: "80MB"
      per_stream_rate_limit_burst: "240MB"
      max_streams_per_user: 0
      split_queries_by_interval: 30m
      max_global_streams_per_user: 0
      unordered_writes: true
      reject_old_samples_max_age: 168h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: e2b
spec:
  replicas: 1
  selector:
    matchLabels: { app: loki }
  template:
    metadata:
      labels: { app: loki }
    spec:
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/{{ .Values.api.pool }}
                operator: Exists
      containers:
      - name: loki
        image: {{ .Values.registry }}/grafana/loki:2.9.3
        imagePullPolicy: IfNotPresent
        args: ["-config.file=/etc/loki/loki-config.yml", "-config.expand-env=true"]
        ports:
        - containerPort: {{ .Values.lokiServicePort | int }}
          name: loki
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        resources:
          requests:
            cpu: {{ .Values.lokiResourcesCpuCount }}m
            memory: {{ .Values.lokiProxyResourcesMemoryMb }}Mi
          limits:
            cpu: {{ .Values.lokiResourcesCpuCount }}m
            memory: {{ .Values.lokiProxyMaxResourcesMemoryMb }}Mi
        livenessProbe:
          httpGet: { path: /ready, port: loki }
          initialDelaySeconds: 60
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: e2b
spec:
  clusterIP: None
  ports:
  - port: {{ .Values.lokiServicePort | int }}
    targetPort: loki
  selector: { app: loki }
